  author: Samuele Ruffino
  description: "Generative perception, 3D vision, and autonomous driving."

  defaultTheme: auto
  ShowShareButtons: true
  ShowReadingTime: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
