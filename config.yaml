# --- SITE PARAMS ---
params:
  env: production
  author: Samuele Ruffino
  description: "Generative perception, 3D vision, and autonomous driving."

  defaultTheme: auto
  ShowShareButtons: true
  ShowReadingTime: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowAllPagesInArchive: true
  ShowPageNums: true
  ShowToc: true
  TocOpen: true

  profileMode:
    enabled: true
    title: "Samuele Ruffino"
    subtitle: "Generative Models • 3D Vision • Autonomous Driving"
    imageUrl: "images/avatar.jpeg"
    imageTitle: "Samuele Ruffino"
    imageWidth: 330
    imageHeight: 330

  home:
    intro: >-
      I'm a research engineer working on **generative models** for **autonomous driving**,
      blending **3D/BEV vision**, **video diffusion**, and **multimodal world models**.
      Currently Co-Op Engineer (AI Foundation) at [**Torc Robotics**](https://torc.ai),
      building layout-conditioned video diffusion and evaluation pipelines.
      MSc in **Electrical Engineering & IT** from [**ETH Zürich**](https://ethz.ch);
      BSc in **Electronics & Communications** from [**Politecnico di Torino**](https://polito.it).

  socialIcons:
    - name: github
      url: "https://github.com/samuruph"
    - name: linkedin
      url: "https://www.linkedin.com/in/samuele-ruffino/"
    - name: x
      url: "https://x.com/samuruph"
    - name: googlescholar
      url: "https://scholar.google.com/citations?user=oQG9kh8AAAAJ&hl=it"
    - name: email
      url: "mailto:samuele.ruffino@gmail.com"

assets:
  disableHLJS: true

markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    noClasses: false
