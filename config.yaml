  profileMode:
    enabled: true
    title: "Samuele Ruffino"
    subtitle: "Generative Models • 3D Vision • Autonomous Driving"
    imageUrl: "images/avatar.jpeg"
    imageTitle: "Samuele Ruffino"
    imageWidth: 330
    imageHeight: 330

  home:
    intro: >-
      **WIP**:
      I'm a researcher working on **generative models**, **computer vision**, and **autonomous driving**, blending 3D/BEV perception, video generation, and multimodal world models.
      
      
      Previously a Research Engineer (AI Foundation) at [Torc Robotics](https://torc.ai), supervised by [Prof. Felix Heide](https://scholar.google.com/citations?user=gRqzSHsAAAAJ&hl=en) and [Dr. Mario Bijelic](https://scholar.google.com/citations?user=aJV5jRYAAAAJ&hl),
      building layout-conditioned video diffusion models and evaluation pipelines.
      
      
      [M.Sc. in Electrical Engineering and Information Technology](https://ethz.ch/en/studies/master/degree-programmes/engineering-sciences/electrical-engineering-and-information-technology.html)
      from [ETH Zürich](https://ethz.ch/en.html); [B.Sc. in Electronics and Communications Engineering](https://www.polito.it/en/education/bachelor-s-degree-programmes/electronic-and-communications-engineering) from [Politecnico di Torino](https://www.polito.it).
      
      
      During my Master's I completed internships at [Siemens](https://www.siemens.com/en-us/) (video generation for autonomous driving), [BMW Group](https://www.bmwgroup.com/en.html) (6DoF pose estimation for industrial applications), and [IBM Research Zürich](https://research.ibm.com/labs/zurich) (neurosymbolic AI).


  socialIcons:
    - name: github
      url: "https://github.com/samuruph"
    - name: linkedin
      url: "https://www.linkedin.com/in/samuele-ruffino/"
    - name: x
      url: "https://x.com/samuruph"
    - name: googlescholar
      url: "https://scholar.google.com/citations?user=oQG9kh8AAAAJ&hl=it"
    - name: email
